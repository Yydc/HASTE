# HASTE configuration for SEED-VIG dataset
# Paper: Table 2 hyperparameters + SEED-VIG specifics

dataset: seedvig
data_root: ./data_seed_vig

# Electrode montage
num_channels: 17
num_bands: 5
adj_k: 5
adj_sigma: 1.0

# Model architecture
spatial_d_model: 64
spatial_heads: 4
spatial_layers: 2
temporal_d_model: 128
temporal_heads: 4
temporal_layers: 1
temporal_window: 10       # look-back L (CLTA)
temporal_ff_dim: 512
d_r: 32                   # GRU hidden dim (spectral fusion)
d_embed: 64               # band embedding dim
d_s: 16                   # low-dim similarity dim
top_k: 3                  # active bands K

# Training
batch_size: 32
epochs: 100
lr: 1.0e-3
weight_decay: 1.0e-4
dropout: 0.1
grad_clip: 1.0
warmup_epochs: 3

# Loss weights
lambda_pred: 0.1
lambda_band: 0.01
lambda_graph: 0.01

# Evaluation
n_folds: 23               # LOSO: 23 subjects
fold: 0
patience: 15
checkpoint_metric: corr_final

# Misc
seed: 2025
amp: true
cache: true
augment: true
num_workers: 4
